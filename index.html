<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0e16" />
<meta name="description" content="Jarvis Timer — say how much time you have and how many things you want to do, and it counts down each segment on a big on-screen clock." />
<title>Jarvis Timer</title>
<style>
  :root {
    --bg: #0a0e16;
    --bg-2: #0e1420;
    --panel: #121a28;
    --panel-2: #16202f;
    --line: #233248;
    --ink: #e6f0fb;
    --ink-dim: #8aa0bd;
    --ink-faint: #5b7290;
    --accent: #2fd3ff;
    --accent-2: #18b6e6;
    --accent-glow: rgba(47, 211, 255, 0.55);
    --good: #44e2a0;
    --warn: #ffb454;
    --bad: #ff6b6b;
    --done: #44e2a0;
    --radius: 16px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--ink);
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(47, 211, 255, 0.10), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(47, 211, 255, 0.06), transparent 55%),
      var(--bg);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: var(--accent); }

  /* ---------- Top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(18,26,40,0.6), rgba(18,26,40,0.15));
    backdrop-filter: blur(6px);
  }
  .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
  .brand .logo {
    width: 30px; height: 30px; flex: none;
    border-radius: 8px;
    display: grid; place-items: center;
    background: radial-gradient(circle at 30% 25%, var(--accent), var(--accent-2) 70%);
    box-shadow: 0 0 18px var(--accent-glow);
    color: #04121a;
  }
  .brand .logo svg { width: 18px; height: 18px; display: block; }
  .brand .name { font-weight: 700; letter-spacing: 0.3px; font-size: 17px; white-space: nowrap; }
  .brand .name b { color: var(--accent); font-weight: 700; }
  .dev-badge {
    font: 700 10px/1 var(--mono);
    letter-spacing: 1.5px;
    color: #04121a;
    background: var(--warn);
    padding: 4px 7px; border-radius: 5px;
    margin-left: 2px;
  }

  .top-right { display: flex; align-items: center; gap: 14px; }

  /* Wall clock */
  .wallclock {
    display: flex; align-items: baseline; gap: 8px;
    font-family: var(--mono);
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: rgba(10,14,22,0.5);
  }
  .wallclock .wc-time { font-size: 19px; font-weight: 600; letter-spacing: 0.5px; }
  .wallclock .wc-ampm { font-size: 11px; color: var(--ink-dim); }
  .wallclock .wc-date { font-size: 11px; color: var(--ink-faint); }
  .wallclock.hidden { display: none; }

  /* toggle switch */
  .toggle {
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none;
    font-size: 12px; color: var(--ink-dim);
  }
  .toggle .track {
    width: 38px; height: 22px; border-radius: 999px;
    background: #1c2740; border: 1px solid var(--line);
    position: relative; transition: background .18s ease, border-color .18s ease;
    flex: none;
  }
  .toggle .knob {
    position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--ink-dim); transition: transform .18s ease, background .18s ease;
  }
  .toggle.on .track { background: rgba(47,211,255,0.22); border-color: var(--accent-2); }
  .toggle.on .knob { transform: translateX(16px); background: var(--accent); }
  .toggle .lbl { white-space: nowrap; }

  /* ---------- Layout ---------- */
  main {
    flex: 1;
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    padding: 28px 20px 48px;
  }
  .view { display: none; }
  .view.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ---------- Setup ---------- */
  .lede {
    font-size: clamp(20px, 4.5vw, 30px);
    line-height: 1.4;
    font-weight: 600;
    letter-spacing: 0.2px;
    margin: 6px 0 26px;
    color: var(--ink);
  }
  .lede .num {
    width: 84px;
    font: 700 inherit var(--sans);
    font-size: inherit;
    text-align: center;
    color: var(--accent);
    background: var(--panel);
    border: 1px solid var(--line);
    border-bottom: 2px solid var(--accent-2);
    border-radius: 10px;
    padding: 4px 6px;
    margin: 0 4px;
  }
  .lede .num.small { width: 62px; }
  .lede .num:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(47,211,255,0.18); }
  .lede .unit { color: var(--ink-dim); font-weight: 500; }

  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin: -10px 0 26px; }
  .preset {
    font: 600 12px var(--sans);
    color: var(--ink-dim);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 13px; cursor: pointer;
    transition: all .15s ease;
  }
  .preset:hover { color: var(--ink); border-color: var(--accent-2); }

  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 0 0 12px;
  }
  .section-head h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: 1.4px;
    color: var(--ink-dim); margin: 0; font-weight: 700;
  }
  .section-head .alloc { font: 600 12px var(--mono); color: var(--ink-dim); }
  .section-head .alloc b { color: var(--accent); }

  .tasks { display: flex; flex-direction: column; gap: 10px; }
  .task-row {
    display: grid;
    grid-template-columns: 26px 1fr 118px 32px;
    align-items: center; gap: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    transition: border-color .15s ease;
  }
  .task-row:focus-within { border-color: var(--accent-2); }
  .task-row .idx {
    font: 700 13px var(--mono); color: var(--ink-faint);
    text-align: center;
  }
  .task-row input.tname {
    background: transparent; border: none; color: var(--ink);
    font: 500 15px var(--sans); padding: 6px 2px; min-width: 0;
  }
  .task-row input.tname::placeholder { color: var(--ink-faint); }
  .task-row input.tname:focus { outline: none; }
  .mins {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 9px; padding: 4px 8px;
  }
  .mins input {
    width: 46px; background: transparent; border: none; color: var(--ink);
    font: 600 15px var(--mono); text-align: right; padding: 2px 0;
  }
  .mins input:focus { outline: none; }
  .mins .suffix { font: 500 11px var(--sans); color: var(--ink-dim); }
  .row-del {
    border: none; background: transparent; color: var(--ink-faint);
    cursor: pointer; font-size: 18px; line-height: 1; border-radius: 7px;
    width: 30px; height: 30px;
  }
  .row-del:hover { color: var(--bad); background: rgba(255,107,107,0.1); }

  .setup-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; align-items: center; }

  button.btn {
    font: 600 14px var(--sans);
    border-radius: 11px; padding: 12px 18px;
    cursor: pointer; border: 1px solid var(--line);
    background: var(--panel); color: var(--ink);
    transition: all .15s ease; display: inline-flex; align-items: center; gap: 8px;
  }
  button.btn:hover { border-color: var(--accent-2); }
  button.btn.ghost { background: transparent; }
  button.btn.primary {
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    color: #04121a; border-color: transparent; font-weight: 700;
    box-shadow: 0 6px 20px -6px var(--accent-glow);
    padding: 13px 26px;
  }
  button.btn.primary:hover { filter: brightness(1.06); }
  button.btn:disabled { opacity: .45; cursor: not-allowed; }
  .add-task {
    margin-top: 12px;
    font: 600 13px var(--sans); color: var(--accent);
    background: transparent; border: 1px dashed var(--line);
    border-radius: 11px; padding: 11px; width: 100%; cursor: pointer;
    transition: all .15s ease;
  }
  .add-task:hover { border-color: var(--accent-2); background: rgba(47,211,255,0.05); }
  .hint { color: var(--bad); font-size: 13px; margin-top: 12px; min-height: 18px; }

  /* ---------- Run view ---------- */
  .run-head { text-align: center; margin-bottom: 4px; }
  .run-head .stage {
    font: 700 12px var(--mono); letter-spacing: 1.6px; text-transform: uppercase;
    color: var(--accent);
  }
  .run-head .tname {
    font-size: clamp(22px, 5vw, 32px); font-weight: 700; margin: 6px 0 2px;
    word-break: break-word;
  }

  .dial-wrap { display: grid; place-items: center; margin: 12px 0 6px; position: relative; }
  .dial { width: min(78vw, 320px); height: min(78vw, 320px); position: relative; }
  .dial svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .dial .track-c { fill: none; stroke: var(--line); stroke-width: 10; }
  .dial .prog-c {
    fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round;
    filter: drop-shadow(0 0 6px var(--accent-glow));
    transition: stroke-dashoffset .25s linear, stroke .3s ease;
  }
  .dial .center {
    position: absolute; inset: 0; display: grid; place-content: center; text-align: center;
  }
  .dial .big {
    font-family: var(--mono); font-weight: 600;
    font-size: clamp(40px, 13vw, 64px); letter-spacing: 1px; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .dial .sub { font-size: 12px; color: var(--ink-dim); margin-top: 8px; letter-spacing: .5px; }
  .dial.paused .prog-c { stroke: var(--warn); }
  .dial.paused .big { color: var(--warn); }

  .overall {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: var(--ink-dim); font-size: 13px; margin: 2px 0 18px;
  }
  .overall .ov-time { font-family: var(--mono); color: var(--ink); font-weight: 600; }

  /* segment strip */
  .strip { display: flex; gap: 6px; margin: 0 auto 22px; max-width: 560px; flex-wrap: wrap; justify-content: center; }
  .seg {
    flex: 1 1 0; min-width: 36px;
    display: flex; flex-direction: column; gap: 5px; align-items: stretch;
    cursor: pointer;
  }
  .seg .bar { height: 6px; border-radius: 999px; background: var(--line); overflow: hidden; position: relative; }
  .seg .bar i { position: absolute; inset: 0; width: 0%; background: var(--ink-faint); border-radius: 999px; }
  .seg.done .bar i { width: 100%; background: var(--good); }
  .seg.active .bar i { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .seg .lbl {
    font-size: 10px; color: var(--ink-faint); text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .seg.active .lbl { color: var(--accent); font-weight: 700; }
  .seg.done .lbl { color: var(--ink-dim); }

  .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .controls .btn { padding: 11px 16px; }
  .ctrl-icon { width: 16px; height: 16px; }

  /* done state */
  .done-card {
    text-align: center; padding: 30px 20px;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
  }
  .done-card .check {
    width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 16px;
    display: grid; place-items: center;
    background: radial-gradient(circle at 30% 25%, var(--good), #1f9e6e);
    box-shadow: 0 0 26px rgba(68,226,160,0.45); color: #04121a;
  }
  .done-card h2 { margin: 0 0 6px; font-size: 24px; }
  .done-card p { color: var(--ink-dim); margin: 0 0 20px; }

  footer {
    text-align: center; color: var(--ink-faint); font-size: 12px;
    padding: 18px; border-top: 1px solid var(--line);
  }
  footer kbd {
    font-family: var(--mono); font-size: 11px; background: var(--panel);
    border: 1px solid var(--line); border-bottom-width: 2px; border-radius: 5px;
    padding: 1px 6px; color: var(--ink-dim);
  }

  @media (max-width: 540px) {
    .topbar { flex-wrap: wrap; }
    .task-row { grid-template-columns: 22px 1fr 104px 28px; }
    .wallclock .wc-date { display: none; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="13" r="8"></circle><path d="M12 9v4l2.5 2.5"></path><path d="M9 2h6"></path>
        </svg>
      </span>
      <span class="name"><b>Jarvis</b> Timer</span>
      <span class="dev-badge" id="devBadge" style="display:none">DEV</span>
    </div>
    <div class="top-right">
      <div class="wallclock" id="wallclock">
        <span class="wc-time" id="wcTime">--:--:--</span>
        <span class="wc-ampm" id="wcAmpm"></span>
        <span class="wc-date" id="wcDate"></span>
      </div>
      <label class="toggle on" id="wcToggle" title="Show or hide the real-time clock">
        <span class="track"><span class="knob"></span></span>
        <span class="lbl">Clock</span>
      </label>
    </div>
  </header>

  <main>
    <!-- ===================== SETUP ===================== -->
    <section class="view active" id="setupView">
      <p class="lede">
        I have
        <input class="num" id="inHours" type="number" min="0" max="24" inputmode="numeric" value="1" aria-label="hours" />
        <span class="unit">h</span>
        <input class="num" id="inMins" type="number" min="0" max="59" inputmode="numeric" value="0" aria-label="minutes" />
        <span class="unit">m</span>
        and want to do
        <input class="num small" id="inCount" type="number" min="1" max="20" inputmode="numeric" value="3" aria-label="number of things" />
        <span class="unit">things.</span>
      </p>

      <div class="presets" id="presets">
        <button class="preset" data-h="0" data-m="15">15 min</button>
        <button class="preset" data-h="0" data-m="25">25 min</button>
        <button class="preset" data-h="0" data-m="30">30 min</button>
        <button class="preset" data-h="1" data-m="0">1 hour</button>
        <button class="preset" data-h="1" data-m="30">90 min</button>
        <button class="preset" data-h="2" data-m="0">2 hours</button>
      </div>

      <div class="section-head">
        <h2>Your things</h2>
        <span class="alloc" id="alloc">planned <b>0</b> min</span>
      </div>
      <div class="tasks" id="taskList"></div>
      <button class="add-task" id="addTask">+ Add another thing</button>

      <div class="hint" id="hint"></div>

      <div class="setup-actions">
        <button class="btn primary" id="startBtn">▶ Start countdown</button>
        <button class="btn ghost" id="splitBtn" title="Divide your total time evenly across all things">Distribute evenly</button>
      </div>
    </section>

    <!-- ===================== RUN ===================== -->
    <section class="view" id="runView">
      <div class="run-head">
        <div class="stage" id="stage">Task 1 of 3</div>
        <div class="tname" id="runName">Thing 1</div>
      </div>

      <div class="dial-wrap">
        <div class="dial" id="dial">
          <svg viewBox="0 0 300 300">
            <circle class="track-c" cx="150" cy="150" r="135"></circle>
            <circle class="prog-c" id="progC" cx="150" cy="150" r="135"></circle>
          </svg>
          <div class="center">
            <div class="big" id="bigTime">00:00</div>
            <div class="sub" id="dialSub">remaining</div>
          </div>
        </div>
      </div>

      <div class="overall">
        <span>Total remaining</span>
        <span class="ov-time" id="ovTime">00:00</span>
        <span id="ovEta"></span>
      </div>

      <div class="strip" id="strip"></div>

      <div class="controls">
        <button class="btn primary" id="pauseBtn">⏸ Pause</button>
        <button class="btn" id="addMinBtn">+1 min</button>
        <button class="btn" id="restartSegBtn">↺ Restart task</button>
        <button class="btn" id="skipBtn">⏭ Next</button>
        <button class="btn ghost" id="stopBtn">■ Stop</button>
      </div>
    </section>

    <!-- ===================== DONE ===================== -->
    <section class="view" id="doneView">
      <div class="done-card">
        <div class="check" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
        </div>
        <h2>All done!</h2>
        <p id="doneMsg">You worked through everything.</p>
        <div class="setup-actions" style="justify-content:center">
          <button class="btn primary" id="againBtn">Run it again</button>
          <button class="btn ghost" id="editBtn">Edit plan</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <span id="footHint"><kbd>Space</kbd> pause · <kbd>N</kbd> next · <kbd>R</kbd> restart task · <kbd>C</kbd> toggle clock</span>
  </footer>

<script>
(function () {
  "use strict";

  // ---------- helpers ----------
  const $ = (id) => document.getElementById(id);
  const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
  const pad = (n) => String(n).padStart(2, "0");
  const LS = {
    get(k, d) { try { const v = localStorage.getItem(k); return v == null ? d : JSON.parse(v); } catch { return d; } },
    set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  };

  // Format ms → "M:SS" / "MM:SS" / "H:MM:SS"
  function fmt(ms) {
    let s = Math.max(0, Math.round(ms / 1000));
    const h = Math.floor(s / 3600); s -= h * 3600;
    const m = Math.floor(s / 60); s -= m * 60;
    if (h > 0) return h + ":" + pad(m) + ":" + pad(s);
    return pad(m) + ":" + pad(s);
  }
  function humanMins(ms) {
    const total = Math.round(ms / 60000);
    if (total < 60) return total + " min";
    const h = Math.floor(total / 60), m = total % 60;
    return m ? h + "h " + m + "m" : h + "h";
  }

  // ---------- DEV badge (matches the constellation convention) ----------
  if (location.pathname.replace(/\/+$/, "").endsWith("/dev")) {
    $("devBadge").style.display = "";
  }

  // =========================================================
  //  Wall clock
  // =========================================================
  const wcEls = { box: $("wallclock"), t: $("wcTime"), ap: $("wcAmpm"), d: $("wcDate"), toggle: $("wcToggle") };
  let wallClockOn = LS.get("jt.wallclock", true);

  function applyWallToggle() {
    wcEls.box.classList.toggle("hidden", !wallClockOn);
    wcEls.toggle.classList.toggle("on", wallClockOn);
  }
  function tickWallClock() {
    if (!wallClockOn) return;
    const now = new Date();
    let h = now.getHours();
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    wcEls.t.textContent = h + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());
    wcEls.ap.textContent = ampm;
    wcEls.d.textContent = now.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  }
  wcEls.toggle.addEventListener("click", () => {
    wallClockOn = !wallClockOn;
    LS.set("jt.wallclock", wallClockOn);
    applyWallToggle();
    tickWallClock();
  });
  applyWallToggle();
  tickWallClock();
  setInterval(tickWallClock, 1000);

  // =========================================================
  //  Sound (WebAudio — no assets)
  // =========================================================
  let actx = null;
  function audio() {
    if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch {} }
    if (actx && actx.state === "suspended") actx.resume();
    return actx;
  }
  function beep(freq, start, dur, gain) {
    const ac = audio(); if (!ac) return;
    const t0 = ac.currentTime + start;
    const osc = ac.createOscillator(), g = ac.createGain();
    osc.type = "sine"; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gain || 0.18, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(ac.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }
  const chimeSegment = () => { beep(880, 0, 0.18); beep(1175, 0.16, 0.28); };
  const chimeFinish = () => { [523, 659, 784, 1047].forEach((f, i) => beep(f, i * 0.14, 0.32, 0.2)); };

  // =========================================================
  //  Setup
  // =========================================================
  const taskListEl = $("taskList");
  let tasks = []; // {name, mins}

  function poolMins() {
    return clamp(+$("inHours").value || 0, 0, 24) * 60 + clamp(+$("inMins").value || 0, 0, 59);
  }
  function sumMins() { return tasks.reduce((a, t) => a + (t.mins || 0), 0); }

  function distribute() {
    const n = tasks.length;
    if (!n) return;
    const pool = poolMins();
    const base = Math.floor(pool / n);
    let rem = pool - base * n;
    tasks.forEach((t, i) => { t.mins = base + (i < rem ? 1 : 0); });
    renderTasks();
  }

  function setCount(n) {
    n = clamp(n, 1, 20);
    $("inCount").value = n;
    const cur = tasks.length;
    if (n > cur) for (let i = cur; i < n; i++) tasks.push({ name: "", mins: 0 });
    else if (n < cur) tasks = tasks.slice(0, n);
    distribute();
  }

  function renderTasks() {
    taskListEl.innerHTML = "";
    tasks.forEach((t, i) => {
      const row = document.createElement("div");
      row.className = "task-row";
      row.innerHTML =
        '<span class="idx">' + (i + 1) + '</span>' +
        '<input class="tname" type="text" placeholder="Thing ' + (i + 1) + '" />' +
        '<span class="mins"><input type="number" min="0" inputmode="numeric" /><span class="suffix">min</span></span>' +
        '<button class="row-del" title="Remove">×</button>';
      const nameI = row.querySelector(".tname");
      const minI = row.querySelector(".mins input");
      nameI.value = t.name;
      minI.value = t.mins;
      nameI.addEventListener("input", () => { t.name = nameI.value; });
      minI.addEventListener("input", () => { t.mins = clamp(Math.round(+minI.value || 0), 0, 1440); refreshAlloc(); });
      minI.addEventListener("blur", () => { minI.value = t.mins; });
      row.querySelector(".row-del").addEventListener("click", () => {
        if (tasks.length <= 1) return;
        tasks.splice(i, 1);
        $("inCount").value = tasks.length;
        renderTasks();
      });
      taskListEl.appendChild(row);
    });
    refreshAlloc();
  }

  function refreshAlloc() {
    $("alloc").innerHTML = "planned <b>" + sumMins() + "</b> min";
  }

  // events
  $("inCount").addEventListener("input", () => setCount(Math.round(+$("inCount").value || 1)));
  $("inHours").addEventListener("input", distribute);
  $("inMins").addEventListener("input", distribute);
  $("addTask").addEventListener("click", () => setCount(tasks.length + 1));
  $("splitBtn").addEventListener("click", distribute);
  $("presets").addEventListener("click", (e) => {
    const b = e.target.closest(".preset"); if (!b) return;
    $("inHours").value = b.dataset.h; $("inMins").value = b.dataset.m;
    distribute();
  });

  // restore last plan
  (function restore() {
    const saved = LS.get("jt.config", null);
    if (saved && Array.isArray(saved.tasks) && saved.tasks.length) {
      $("inHours").value = saved.h ?? 1;
      $("inMins").value = saved.m ?? 0;
      $("inCount").value = saved.tasks.length;
      tasks = saved.tasks.map((t) => ({ name: t.name || "", mins: clamp(+t.mins || 0, 0, 1440) }));
      renderTasks();
    } else {
      setCount(3);
    }
  })();

  // =========================================================
  //  Run engine
  // =========================================================
  const RUN = {
    segs: [],        // {name, durMs}
    i: 0,
    remaining: 0,    // ms left in current seg
    running: false,
    endAt: 0,        // timestamp when current seg ends (while running)
    ticker: null,
  };

  function show(view) {
    ["setupView", "runView", "doneView"].forEach((v) => $(v).classList.toggle("active", v === view));
  }

  function startRun() {
    const hint = $("hint");
    const valid = tasks.filter((t) => t.mins > 0);
    if (!valid.length) { hint.textContent = "Give at least one thing some minutes."; return; }
    hint.textContent = "";

    // persist plan
    LS.set("jt.config", { h: +$("inHours").value || 0, m: +$("inMins").value || 0, tasks });

    RUN.segs = tasks.filter((t) => t.mins > 0).map((t, i) => ({
      name: (t.name && t.name.trim()) || "Thing " + (i + 1),
      durMs: t.mins * 60000,
    }));
    RUN.i = 0;
    RUN.remaining = RUN.segs[0].durMs;
    RUN.running = true;
    RUN.endAt = performance.now() + RUN.remaining;
    audio(); // unlock on user gesture
    buildStrip();
    show("runView");
    startTicker();
    renderRun();
  }

  function startTicker() {
    stopTicker();
    RUN.ticker = setInterval(onTick, 200);
  }
  function stopTicker() { if (RUN.ticker) { clearInterval(RUN.ticker); RUN.ticker = null; } }

  function onTick() {
    if (RUN.running) {
      RUN.remaining = RUN.endAt - performance.now();
      if (RUN.remaining <= 0) { advance(); return; }
    }
    renderRun();
  }

  function advance() {
    chimeSegment();
    flash();
    if (RUN.i >= RUN.segs.length - 1) { finish(); return; }
    RUN.i++;
    RUN.remaining = RUN.segs[RUN.i].durMs;
    RUN.endAt = performance.now() + RUN.remaining;
    renderRun();
  }

  function finish() {
    RUN.running = false;
    stopTicker();
    chimeFinish();
    const n = RUN.segs.length;
    $("doneMsg").textContent = "You worked through " + n + (n === 1 ? " thing" : " things") + " — " +
      humanMins(RUN.segs.reduce((a, s) => a + s.durMs, 0)) + " well spent.";
    document.title = "Done · Jarvis Timer";
    show("doneView");
  }

  function pauseToggle() {
    if (!RUN.segs.length) return;
    if (RUN.running) {
      RUN.remaining = RUN.endAt - performance.now();
      RUN.running = false;
    } else {
      RUN.endAt = performance.now() + RUN.remaining;
      RUN.running = true;
    }
    renderRun();
  }

  function skip() { if (RUN.segs.length) advance(); }
  function restartSeg() {
    if (!RUN.segs.length) return;
    RUN.remaining = RUN.segs[RUN.i].durMs;
    RUN.endAt = performance.now() + RUN.remaining;
    if (!RUN.running) { RUN.running = true; }
    renderRun();
  }
  function addMinute() {
    if (!RUN.segs.length) return;
    RUN.remaining += 60000;
    if (RUN.running) RUN.endAt += 60000;
    renderRun();
  }
  function stopRun() {
    RUN.running = false; stopTicker(); RUN.segs = [];
    document.title = "Jarvis Timer";
    show("setupView");
  }

  function flash() {
    document.body.animate(
      [{ boxShadow: "inset 0 0 0 0 rgba(47,211,255,0)" },
       { boxShadow: "inset 0 0 120px 0 rgba(47,211,255,0.30)" },
       { boxShadow: "inset 0 0 0 0 rgba(47,211,255,0)" }],
      { duration: 600, easing: "ease-out" }
    );
  }

  // ---------- run rendering ----------
  const CIRC = 2 * Math.PI * 135;
  $("progC").style.strokeDasharray = CIRC;

  function buildStrip() {
    const strip = $("strip");
    strip.innerHTML = "";
    RUN.segs.forEach((s, i) => {
      const el = document.createElement("div");
      el.className = "seg";
      el.innerHTML = '<div class="bar"><i></i></div><div class="lbl">' + escapeHtml(s.name) + '</div>';
      el.title = s.name + " · " + humanMins(s.durMs);
      el.addEventListener("click", () => jumpTo(i));
      strip.appendChild(el);
    });
  }

  function jumpTo(i) {
    if (i === RUN.i) return;
    RUN.i = clamp(i, 0, RUN.segs.length - 1);
    RUN.remaining = RUN.segs[RUN.i].durMs;
    RUN.endAt = performance.now() + RUN.remaining;
    renderRun();
  }

  function renderRun() {
    const seg = RUN.segs[RUN.i];
    if (!seg) return;
    const rem = Math.max(0, RUN.remaining);

    $("stage").textContent = "Task " + (RUN.i + 1) + " of " + RUN.segs.length;
    $("runName").textContent = seg.name;
    $("bigTime").textContent = fmt(rem);
    $("dialSub").textContent = RUN.running ? "remaining" : "paused";

    // ring
    const frac = clamp(rem / seg.durMs, 0, 1);
    $("progC").style.strokeDashoffset = CIRC * (1 - frac);
    $("dial").classList.toggle("paused", !RUN.running);

    // overall remaining = this seg + all later segs
    let overall = rem;
    for (let k = RUN.i + 1; k < RUN.segs.length; k++) overall += RUN.segs[k].durMs;
    $("ovTime").textContent = fmt(overall);
    const eta = new Date(Date.now() + overall);
    $("ovEta").textContent = "· done ~" + (eta.getHours() % 12 || 12) + ":" + pad(eta.getMinutes()) +
      (eta.getHours() >= 12 ? "pm" : "am");

    // strip
    const segEls = $("strip").children;
    for (let k = 0; k < segEls.length; k++) {
      const el = segEls[k];
      el.classList.toggle("done", k < RUN.i);
      el.classList.toggle("active", k === RUN.i);
      const bar = el.querySelector("i");
      bar.style.width = k < RUN.i ? "100%" : k === RUN.i ? (100 * (1 - frac)) + "%" : "0%";
    }

    // pause button + tab title
    $("pauseBtn").innerHTML = RUN.running ? "⏸ Pause" : "▶ Resume";
    document.title = (RUN.running ? "" : "❚❚ ") + fmt(rem) + " · " + seg.name + " — Jarvis Timer";
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }

  // ---------- wire run controls ----------
  $("startBtn").addEventListener("click", startRun);
  $("pauseBtn").addEventListener("click", pauseToggle);
  $("skipBtn").addEventListener("click", skip);
  $("restartSegBtn").addEventListener("click", restartSeg);
  $("addMinBtn").addEventListener("click", addMinute);
  $("stopBtn").addEventListener("click", stopRun);
  $("againBtn").addEventListener("click", startRun);
  $("editBtn").addEventListener("click", () => show("setupView"));

  // ---------- keyboard ----------
  document.addEventListener("keydown", (e) => {
    if (/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)) return;
    const runActive = $("runView").classList.contains("active");
    if (e.key === "c" || e.key === "C") { wcEls.toggle.click(); return; }
    if (!runActive) return;
    if (e.code === "Space") { e.preventDefault(); pauseToggle(); }
    else if (e.key === "n" || e.key === "N") skip();
    else if (e.key === "r" || e.key === "R") restartSeg();
  });
})();
</script>
</body>
</html>
